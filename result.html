<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Result – Pulse Canvas</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .art-container {
      width: 100%;
      max-width: 1200px;
      height: 75vh; 
      background: #000;
      border: 1px solid rgba(255,255,255,0.2);
      position: relative;
      margin: 20px auto;
    }
    #remoteCanvasStream {
      width: 100%;
      height: 100%;
      object-fit: cover; 
    }
    #defaultCanvas0 {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      z-index: -100;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">Pulse Canvas</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="instructions.html" class="primary">Start</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Session View</h1>
    <p id="meta"></p>

    <div class="card">
      <h2 style="margin:0 0 10px 0;">Generated Topic</h2>
      <div id="topicText" style="font-size:1.1rem; color:#fff;">
        Loading topic…
      </div>
    </div>

    <div class="row">
      <div id="sensorBox"></div> 

      <button id="btnStartAudio" class="btn">Start Connection</button>
      <button id="btnMute" class="btn secondary" disabled>Mute Mic</button>
      <button id="btnHangup" class="btn secondary" disabled>Hang Up</button>
    </div>
    <p id="callStatus" style="font-size: 0.85rem; color: #aaa;">Status: idle</p>

    <div class="art-container">
      <video id="remoteCanvasStream" autoplay playsinline></video>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>

    <div class="row" style="margin-top:20px;">
      <a href="conversation.html" class="btn secondary">Conversation Tips</a>
      <a href="index.html" class="btn secondary">End Session</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

  <script src="js/sketch.js"></script> 

  <script>
    const params = new URLSearchParams(window.location.search);
    const session = params.get("session") || "";
    window.__PULSE_SESSION__ = session;

    const meta = document.getElementById("meta");
    meta.textContent = session ? `SESSION CODE: ${session}` : "NO SESSION DETECTED";

    if (session) {
      const topicRef = firebase.database().ref(`sessions/${session}/topic`);
      topicRef.on("value", (snap) => {
        const topicData = snap.val();
        if (topicData && topicData.text) {
          document.getElementById("topicText").textContent = topicData.text;
        }
      });
    }

    // This makes sure clicking "Start Connection" also starts the music
    document.getElementById("btnStartAudio").addEventListener("click", () => {
      if (typeof userStartAudio === "function") {
        userStartAudio(); // Unlocks the browser audio engine
        audioStarted = true; // Tells your sketch to start playing the mp3s
      }
    });
  </script>

  <script src="js/result-call.js"></script>
</body>
</html>
