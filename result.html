<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Result – Pulse Canvas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="title">Pulse Canvas</span>
      </a>

      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="instructions.html" class="primary">Start</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Your conversation buddy’s screen</h1>
    <p class="small" id="meta"></p>

    <div class="card" style="margin: 14px 0;">
      <h2 style="margin:0 0 6px 0;">Your Topic</h2>
      <div id="topicText" style="font-size:1.05rem; line-height:1.6; color:rgba(255,255,255,0.92);">
        Loading topic…
      </div>
      <p id="topicStatus" class="small" style="margin-top:10px;">&nbsp;</p>
    </div>

    <div class="row" style="margin-bottom: 20px;">
      <button id="btnStartAudio" class="btn" disabled>Start Connection</button>
      <button id="btnMute" class="btn secondary" disabled>Mute Mic</button>
      <button id="btnHangup" class="btn secondary" disabled>Hang Up</button>
      <span id="callStatus" class="small" style="margin-left:10px;">Status: idle</span>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>

    <div class="screen" style="position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
      
      <video id="remoteCanvasStream" autoplay playsinline style="width: 100%; height: 100%; object-fit: contain;"></video>
      
      <canvas id="artCanvas" width="800" height="450" style="position: absolute; opacity: 0; pointer-events: none;"></canvas>
    </div>

    <div class="row" style="margin-top:18px;">
      <a href="conversation.html" class="btn secondary">Conversation Tips</a>
      <a href="index.html" class="btn secondary">Home</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const session = params.get("session") || "";
    window.__PULSE_SESSION__ = session;

    const meta = document.getElementById("meta");
    meta.textContent = session ? `Session: ${session}` : "No session code found. Open this page through Connect.";

    // Automatically load the topic that was generated during session creation
    if (session) {
      const topicRef = firebase.database().ref(`sessions/${session}/topic`);
      topicRef.on("value", (snap) => {
        const topicData = snap.val();
        if (topicData && topicData.text) {
          document.getElementById("topicText").textContent = topicData.text;
          document.getElementById("topicStatus").textContent = "Topic synced successfully.";
          document.getElementById("btnStartAudio").disabled = false;
        }
      });
    }

    // A tiny placeholder to draw on the local canvas so WebRTC has something to capture. 
    // Replace this logic with your actual p5.js code later!
    const canvas = document.getElementById("artCanvas");
    const ctx = canvas.getContext("2d");
    function drawPlaceholder() {
      ctx.fillStyle = `hsl(${(Date.now() / 10) % 360}, 100%, 50%)`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      requestAnimationFrame(drawPlaceholder);
    }
    drawPlaceholder();
  </script>

  <script src="js/result-call.js"></script>
</body>
</html>
