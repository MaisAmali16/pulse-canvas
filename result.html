<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Result – Pulse Canvas</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .art-container {
      width: 100%;
      height: 85vh; 
      background: #05070d;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      margin-top: 20px;
    }
    #remoteCanvasStream {
      width: 100%;
      height: 100%;
      object-fit: cover; 
    }
    #defaultCanvas0 {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      z-index: -100;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="title">Pulse Canvas</span>
      </a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="instructions.html" class="primary">Start</a>
      </nav>
    </div>
  </header>

  <main style="max-width: 1400px; padding: 0 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px;">
      <div style="flex: 1; min-width: 300px;">
        <h1 style="margin-top: 0;">Session View</h1>
        <p class="small" id="meta"></p>

        <div class="card" style="margin: 14px 0;">
          <h2 style="margin:0 0 6px 0;">Your Topic</h2>
          <div id="topicText" style="font-size:1.05rem; line-height:1.6; color:rgba(255,255,255,0.92);">
            Loading topic…
          </div>
        </div>

        <div class="row" style="margin-bottom: 20px;">
          <div id="sensorBox"></div> 

          <button id="btnStartAudio" class="btn">Start Connection</button>
          <button id="btnMute" class="btn secondary" disabled>Mute Mic</button>
          <button id="btnHangup" class="btn secondary" disabled>Hang Up</button>
          <span id="callStatus" class="small" style="margin-left:10px;">Status: idle</span>
        </div>
      </div>
    </div>

    <div class="art-container">
      <video id="remoteCanvasStream" autoplay playsinline></video>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>

    <div class="row" style="margin-top:18px;">
      <a href="conversation.html" class="btn secondary">Conversation Tips</a>
      <a href="index.html" class="btn secondary">Home</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>

  <script src="js/sketch.js"></script> 

  <script>
    const params = new URLSearchParams(window.location.search);
    const session = params.get("session") || "";
    window.__PULSE_SESSION__ = session;

    const meta = document.getElementById("meta");
    meta.textContent = session ? `Session: ${session}` : "No session code found. Open this page through Connect.";

    if (session) {
      const topicRef = firebase.database().ref(`sessions/${session}/topic`);
      topicRef.on("value", (snap) => {
        const topicData = snap.val();
        if (topicData && topicData.text) {
          document.getElementById("topicText").textContent = topicData.text;
        }
      });
    }
  </script>

  <script src="js/result-call.js"></script>
</body>
</html>
